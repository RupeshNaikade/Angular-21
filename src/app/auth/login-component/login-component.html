<div class="auth-container">
  <h2>Account Access</h2>
  
  <form #authForm="ngForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" ngModel required email placeholder="Enter email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" ngModel required minlength="6" placeholder="Enter password">
    </div>

    <div class="button-row">
      <button type="button" class="login-btn" 
              (click)="onLogin(authForm)">
        Login
      </button>
      
      <button type="button" class="register-btn" 
              (click)="onRegister(authForm)">
        Register
      </button>
    </div>
  </form>
</div>
